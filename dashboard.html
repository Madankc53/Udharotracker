<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udharo Tracker - ड्यासबोर्ड</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand">📒 Udharo Tracker</a>
        <div class="navbar-menu">
            <a href="dashboard.html" class="active">ड्यासबोर्ड</a>
            <a href="customers.html">ग्राहकहरू</a>
            <a href="reports.html">रिपोर्ट</a>
            <a href="#" onclick="logout()">लगआउट</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>कुल उधारो</h3>
                <div class="stat-value" id="totalUdharo">रु. ०</div>
            </div>
            
            <div class="stat-card">
                <h3>कुल भुक्तानी</h3>
                <div class="stat-value text-success" id="totalPaid">रु. ०</div>
            </div>
            
            <div class="stat-card">
                <h3>बाँकी उधारो</h3>
                <div class="stat-value text-danger" id="outstanding">रु. ०</div>
            </div>
            
            <div class="stat-card">
                <h3>कुल ग्राहक</h3>
                <div class="stat-value" id="customerCount">०</div>
            </div>
        </div>
        
        <div class="card">
            <h2 class="card-title">⚠️ बक्यौता सूची</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>ग्राहकको नाम</th><th>फोन</th><th>बाँकी रकम</th><th>कार्य</th></tr>
                    </thead>
                    <tbody id="overdueList">
                        <tr><td colspan="4" class="text-center">लोड हुँदै...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
