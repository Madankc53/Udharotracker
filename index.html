<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Udharo Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      max-width:500px;
      margin:auto;
      padding:20px;
    }
    input,button{
      width:100%;
      padding:12px;
      margin:8px 0;
    }
    button{
      background:#0d6efd;
      color:white;
      border:none;
    }
  </style>
</head>
<body>

<h2>Udharo Tracker</h2>

<input id="customer" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="amount" placeholder="Amount">

<button onclick="saveData()">Save</button>

<p id="msg"></p>

<script>
function saveData(){

  const data = {
    customer: document.getElementById("customer").value,
    phone: document.getElementById("phone").value,
    debit: document.getElementById("amount").value,
    credit: 0,
    description: "Udharo"
  };

  fetch(
   "https://script.google.com/macros/s/AKfycbxVZy-biQDZAETUWVW5DoQGYbbkBGeYI2dqbYPJKv9zyy0yuXtCnieluUya0aBpc8iPVg/exec",
   {
      method:"POST",
      body: JSON.stringify(data)
   }
  )
  .then(res=>res.json())
  .then(res=>{
      document.getElementById("msg").innerText="Saved!";
  })
  .catch(err=>{
      document.getElementById("msg").innerText="Error";
      console.log(err);
  });

}
</script>

</body>
</html>
